<div>
  <h1>Product Work</h1>

  @if (products$ | async; as products) {
    <p>Length: {{ products.length }}</p>

    @for (item of products; track item.id) {
      <div>
        <h3>Name: {{ item.productName }}</h3>

        <p>Id: {{ item.id }}</p>

        <p>Quality: {{ item.quality }}</p>
      </div>
    }
  } @else {
    <p>Loading...</p>
  }
</div>
